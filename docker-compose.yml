##############################################################################
# Beconnect — docker-compose.yml
# Branch: robustez-do-beconnected
#
# Arquitectura de microserviços:
#   gateway        → nginx API Gateway (porta 8000 — entrada única)
#   app            → Laravel PHP 8.3 FPM
#   nginx          → nginx para Laravel (porta interna 80)
#   cart-service   → Node.js + Redis Streams (porta interna 3001)
#   payment-service→ C# .NET 8 (porta interna 8082)
#   stock-service  → Java Spring Boot 3 + JPA (porta interna 8081)
#   pos-pwa        → React PWA + IndexedDB (porta 3002)
#   mysql          → MySQL 8.0
#   redis          → Redis 7 (cache + filas + cart streams)
#   meilisearch    → Motor de pesquisa
#   soketi         → WebSockets
#   queue_*        → Workers Laravel por domínio
#   scheduler      → Laravel scheduler
##############################################################################

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # API GATEWAY — nginx (porta 8000, entrada única pública)
  # ═══════════════════════════════════════════════════════════════════════════
  gateway:
    image: nginx:1.25-alpine
    container_name: beconnect_gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./services/api-gateway/nginx.gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - beconnect
    depends_on:
      - nginx
      - cart-service
      - payment-service
      - stock-service
      - pos-pwa
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/gateway/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # CART SERVICE — Node.js 20 + Redis Streams
  # ═══════════════════════════════════════════════════════════════════════════
  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: beconnect_cart
    restart: unless-stopped
    environment:
      PORT:               3001
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      STOCK_SERVICE_URL:  http://stock-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
      ALLOWED_ORIGINS:    http://localhost:8000,http://gateway:80
      INTERNAL_API_KEY:   "${INTERNAL_API_KEY:-beconnect_internal}"
      LARAVEL_JWT_SECRET: "${APP_KEY:-beconnect_dev_secret}"
      LOG_LEVEL:          info
      NODE_ENV:           production
    networks:
      - beconnect
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # PAYMENT SERVICE — C# .NET 8
  # ═══════════════════════════════════════════════════════════════════════════
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: beconnect_payment
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS:        http://+:8082
      ASPNETCORE_ENVIRONMENT: Production
      DB_HOST:                mysql
      DB_PORT:                3306
      DB_DATABASE:            "${DB_DATABASE:-beconnect}"
      DB_USERNAME:            "${DB_USERNAME:-beconnect}"
      DB_PASSWORD:            "${DB_PASSWORD:-beconnect_secret}"
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      STOCK_SERVICE_URL:      http://stock-service:8081
      LARAVEL_APP_URL:        http://nginx:80
      INTERNAL_API_KEY:       "${INTERNAL_API_KEY:-beconnect_internal}"
      EMola__ApiUrl:          "${EMOLA_API_URL:-https://api.sandbox.emola.co.mz}"
      EMola__ApiKey:          "${EMOLA_API_KEY:-}"
      EMola__MerchantNumber:  "${EMOLA_MERCHANT_NUMBER:-}"
    networks:
      - beconnect
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # STOCK SERVICE — Java Spring Boot 3 + JPA
  # ═══════════════════════════════════════════════════════════════════════════
  stock-service:
    build:
      context: ./services/stock-service
      dockerfile: Dockerfile
    container_name: beconnect_stock
    restart: unless-stopped
    environment:
      DB_HOST:         mysql
      DB_PORT:         3306
      DB_DATABASE:     "${DB_DATABASE:-beconnect}"
      DB_USERNAME:     "${DB_USERNAME:-beconnect}"
      DB_PASSWORD:     "${DB_PASSWORD:-beconnect_secret}"
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-beconnect_internal}"
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    networks:
      - beconnect
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/stock/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # POS PWA — React + IndexedDB (nginx estático)
  # ═══════════════════════════════════════════════════════════════════════════
  pos-pwa:
    build:
      context: ./services/pos-pwa
      dockerfile: Dockerfile
    container_name: beconnect_pos_pwa
    restart: unless-stopped
    networks:
      - beconnect
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ═══════════════════════════════════════════════════════════════════════════
  # LARAVEL APP — PHP 8.3 FPM
  # ═══════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: beconnect_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - beconnect
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PHP_OPCACHE_ENABLE=1

  # nginx para Laravel
  nginx:
    image: nginx:1.25-alpine
    container_name: beconnect_nginx
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/nginx/beconnect.conf:/etc/nginx/conf.d/default.conf
    networks:
      - beconnect
    depends_on:
      - app

  # ═══════════════════════════════════════════════════════════════════════════
  # MYSQL 8.0
  # ═══════════════════════════════════════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: beconnect_mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-beconnect_secret}"
      MYSQL_DATABASE:      "${DB_DATABASE:-beconnect}"
      MYSQL_USER:          "${DB_USERNAME:-beconnect}"
      MYSQL_PASSWORD:      "${DB_PASSWORD:-beconnect_secret}"
    volumes:
      - beconnect_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-beconnect_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beconnect

  # ═══════════════════════════════════════════════════════════════════════════
  # REDIS 7 — cache + filas + cart streams
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: beconnect_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - beconnect_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - beconnect

  # ═══════════════════════════════════════════════════════════════════════════
  # MEILISEARCH — pesquisa de produtos
  # ═══════════════════════════════════════════════════════════════════════════
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: beconnect_meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "${MEILISEARCH_KEY:-beconnect_meili_secret}"
      MEILI_ENV:        production
    volumes:
      - beconnect_meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - beconnect

  # ═══════════════════════════════════════════════════════════════════════════
  # SOKETI — WebSockets (tracking, notificações)
  # ═══════════════════════════════════════════════════════════════════════════
  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: beconnect_soketi
    restart: unless-stopped
    ports:
      - "6001:6001"
      - "9601:9601"
    environment:
      SOKETI_DEFAULT_APP_ID:       "${PUSHER_APP_ID:-beconnect}"
      SOKETI_DEFAULT_APP_KEY:      "${PUSHER_APP_KEY:-beconnect_key}"
      SOKETI_DEFAULT_APP_SECRET:   "${PUSHER_APP_SECRET:-beconnect_secret}"
      SOKETI_DEFAULT_APP_MAX_CONNS: "5000"
      SOKETI_DEBUG:                "0"
    networks:
      - beconnect

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: beconnect_phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST:     mysql
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: "${DB_PASSWORD:-beconnect_secret}"
      UPLOAD_LIMIT: 50M
    networks:
      - beconnect
    depends_on:
      mysql:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════════
  # QUEUE WORKERS — Laravel
  # ═══════════════════════════════════════════════════════════════════════════
  queue_payments:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    container_name: beconnect_queue_payments
    restart: unless-stopped
    working_dir: /var/www
    volumes: [.:/var/www]
    command: php artisan queue:work --queue=payments --sleep=2 --tries=5 --backoff=30 --max-time=3600 --memory=256
    networks: [beconnect]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  queue_delivery:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    container_name: beconnect_queue_delivery
    restart: unless-stopped
    working_dir: /var/www
    volumes: [.:/var/www]
    command: php artisan queue:work --queue=delivery,orders --sleep=2 --tries=3 --backoff=10 --max-time=3600 --memory=128
    networks: [beconnect]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  queue_notifications:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    container_name: beconnect_queue_notifications
    restart: unless-stopped
    working_dir: /var/www
    volumes: [.:/var/www]
    command: php artisan queue:work --queue=notifications,search_index --sleep=5 --tries=3 --backoff=60 --max-time=3600 --memory=128
    networks: [beconnect]
    depends_on:
      redis: { condition: service_healthy }

  queue_checkout:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    container_name: beconnect_queue_checkout
    restart: unless-stopped
    working_dir: /var/www
    volumes: [.:/var/www]
    command: php artisan queue:work --queue=checkout --sleep=1 --tries=3 --backoff=5 --max-time=3600 --memory=256
    networks: [beconnect]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  queue:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    container_name: beconnect_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes: [.:/var/www]
    command: php artisan queue:work --queue=default --sleep=3 --tries=3 --max-time=3600 --memory=128
    networks: [beconnect]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }

  scheduler:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    container_name: beconnect_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes: [.:/var/www]
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks: [beconnect]
    depends_on:
      mysql: { condition: service_healthy }

  # Node para build frontend
  node:
    image: node:20-alpine
    container_name: beconnect_node
    working_dir: /var/www
    volumes: [.:/var/www]
    command: sh -c "npm install --legacy-peer-deps && npm run build"
    profiles: [build]

##############################################################################
# Networks & Volumes
##############################################################################
networks:
  beconnect:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  beconnect_mysql_data:
  beconnect_redis_data:
  beconnect_meili_data:
