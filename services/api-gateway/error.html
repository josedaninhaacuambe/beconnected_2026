<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beconnect — Serviço Indisponível</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #F9FAFB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: #D4A017;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: #111827;
      letter-spacing: -1px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(212,160,23,0.35);
    }

    .card {
      background: #1F2937;
      border: 1px solid #374151;
      border-radius: 20px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #F9FAFB;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: #D4A017;
      color: #111827;
      font-weight: 800;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .divider {
      width: 40px;
      height: 3px;
      background: #D4A017;
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #6B7280;
    }
  </style>
</head>
<body>
  <div class="logo">BC</div>

  <div class="card">
    <span class="icon">⚙️</span>
    <h1>Serviço temporariamente indisponível</h1>
    <div class="divider"></div>
    <p>
      O Beconnect está a efectuar manutenção ou a reiniciar os serviços.<br />
      Por favor aguarda alguns instantes e tenta novamente.
    </p>
    <button class="btn" onclick="window.location.reload()">Tentar novamente</button>
  </div>

  <div class="footer">Beconnect &copy; 2025 &mdash; Mercado Virtual de Moçambique</div>
</body>
</html>
