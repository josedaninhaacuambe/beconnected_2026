# ═══════════════════════════════════════════════════════════════════
# Beconnect API Gateway — nginx
# Ponto de entrada único: porta 80 (exposta no host como 8000)
#
# Routing:
#   /api/cart/**          → cart-service:3001   (Node.js)
#   /api/checkout/**      → cart-service:3001   (checkout inicia aqui)
#   /api/stock/**         → stock-service:8081  (Java) — acesso interno apenas
#   /api/internal/pay/**  → payment-service:8082 (C#) — interno
#   /pos/**               → pos-pwa:3002        (React PWA)
#   /**                   → beconnect app:9000  (PHP Laravel FPM via nginx interno)
# ═══════════════════════════════════════════════════════════════════

# ─── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=cart_zone:20m   rate=100r/s;
limit_req_zone $binary_remote_addr zone=checkout_zone:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=global_zone:50m  rate=200r/s;

# ─── Upstream backends ────────────────────────────────────────────────────────
upstream cart_service {
    least_conn;
    server cart-service:3001 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream payment_service {
    server payment-service:8082 max_fails=3 fail_timeout=15s;
    keepalive 16;
}

upstream stock_service {
    server stock-service:8081 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream laravel_app {
    server app:9000;    # PHP-FPM — serve via unix socket ou TCP
    keepalive 32;
}

upstream pos_pwa {
    server pos-pwa:3002;
    keepalive 8;
}

# ─── Servidor principal ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    client_max_body_size 32M;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ─── Health check do gateway ────────────────────────────────────────────
    location = /gateway/health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ─── Cart Service — pública, rate limited ───────────────────────────────
    location /api/cart {
        limit_req zone=cart_zone burst=200 nodelay;
        limit_req_status 429;

        proxy_pass         http://cart_service;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Session-Id      $cookie_cart_session;
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
    }

    # ─── Checkout — mais restrito ────────────────────────────────────────────
    location /api/cart/checkout {
        limit_req zone=checkout_zone burst=20 nodelay;

        proxy_pass         http://cart_service;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ─── Stock Service — apenas chamadas internas (bloqueia externas) ───────
    location /api/stock {
        # Apenas IPs da rede Docker interna
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass         http://stock_service;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 15s;
    }

    # ─── Payment webhooks (eMola, MPesa) — públicos ──────────────────────────
    location /api/checkout/webhook {
        proxy_pass         http://payment_service;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ─── POS PWA ─────────────────────────────────────────────────────────────
    location /pos {
        proxy_pass         http://pos_pwa;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;

        # Cache para assets estáticos do POS
        proxy_cache_valid 200 1h;
    }

    # ─── Laravel App — todo o resto ──────────────────────────────────────────
    location / {
        limit_req zone=global_zone burst=300 nodelay;

        # O nginx interno do Laravel já está configurado;
        # aqui re-proxiamos para o nginx do container app.
        # Em produção, o gateway fala directamente com PHP-FPM via fastcgi_pass.
        proxy_pass         http://laravel_nginx;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Upstream para o nginx do Laravel (container nginx existente)
upstream laravel_nginx {
    server nginx:80;
    keepalive 32;
}
