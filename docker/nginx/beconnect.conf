server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/beconnect_access.log;
    error_log  /var/log/nginx/beconnect_error.log;

    # Tamanho máximo de upload (Excel, CSV, imagens)
    client_max_body_size 20M;

    # SPA — todas as rotas web vão para o index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    # Ficheiros estáticos compilados pelo Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Bloquear acesso a ficheiros sensíveis
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    # Bloquear acesso directo ao storage (excepto public)
    location ~ ^/storage/(?!app/public) {
        deny all;
    }
}
