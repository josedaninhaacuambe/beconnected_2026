# ─────────────────────────────────────────────────────────────────────────────
# beconnect.conf — nginx para Laravel (PHP-FPM load balancing)
#
# Com deploy.replicas: 4, o Docker DNS resolve "app" para os 4 containers.
# O resolver 127.0.0.11 (Docker DNS) garante actualização dinâmica.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream PHP-FPM — Docker DNS resolve para todos os containers "app"
upstream php_fpm_pool {
    least_conn;                       # envia para o worker com menos conexões
    server app:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;                     # conexões persistentes FastCGI
}

# Upstream estático (assets) — sem PHP-FPM
map $uri $static_asset {
    ~*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ 1;
    default 0;
}

server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    # Docker internal DNS — actualiza upstream quando réplicas sobem/descem
    resolver 127.0.0.11 valid=10s ipv6=off;

    access_log /var/log/nginx/beconnect_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/beconnect_error.log warn;

    client_max_body_size 32M;

    # ─── Compressão ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ─── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Assets estáticos (Vite build) ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ─── Storage público ───────────────────────────────────────────────────────
    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ─── SPA + PHP-FPM ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Load balance entre réplicas PHP-FPM
        fastcgi_pass php_fpm_pool;

        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;

        # Timeouts e buffers otimizados
        fastcgi_read_timeout       120s;
        fastcgi_send_timeout       120s;
        fastcgi_connect_timeout    10s;
        fastcgi_buffer_size        128k;
        fastcgi_buffers            8 256k;
        fastcgi_busy_buffers_size  256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors   off;

        # Cache de conexão FastCGI
        fastcgi_keep_conn on;
    }

    # ─── Bloquear ficheiros sensíveis ──────────────────────────────────────────
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ ^/(vendor|node_modules)/ {
        deny all;
        return 404;
    }
}
